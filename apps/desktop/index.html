<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta
      content="width=device-width, initial-scale=1.0"
      name="viewport"
    />
    <meta content="#f3f3f3" name="theme-color" />

    <!--
      Native window, WebView and document surfaces must remain aligned.
      See docs/adr/ADR-003-opaque-window-surface.md.
    -->
    <style id="window-backing-surface">
      :root {
        --window-backing-surface: #f3f3f3;
        --fatal-foreground: #18181b;
        --fatal-muted: #71717a;
        --fatal-border: #d4d4d8;
        --fatal-hover: rgb(24 24 27 / 5%);
        --fatal-danger: #b42318;
        --fatal-danger-surface: #fee4e2;
      }

      html,
      body,
      #root {
        width: 100%;
        height: 100%;
        margin: 0;
        background: var(--window-backing-surface);
      }

      .fatal-surface,
      .fatal-surface * {
        box-sizing: border-box;
      }

      .fatal-surface {
        display: grid;
        width: 100%;
        min-height: 100%;
        place-items: center;
        overflow: auto;
        padding: 48px 32px;
        color: var(--fatal-foreground);
        background: var(--window-backing-surface);
        font-family:
          Inter,
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
      }

      .fatal-content {
        width: min(100%, 620px);
      }

      .fatal-icon {
        display: grid;
        width: 44px;
        height: 44px;
        place-items: center;
        color: var(--fatal-danger);
        background: var(--fatal-danger-surface);
        border-radius: 50%;
      }

      .fatal-icon svg {
        width: 22px;
        height: 22px;
      }

      .fatal-title {
        margin: 22px 0 0;
        font-size: 20px;
        font-weight: 650;
        line-height: 1.4;
        letter-spacing: -0.015em;
      }

      .fatal-description {
        max-width: 560px;
        margin: 10px 0 0;
        color: var(--fatal-muted);
        font-size: 14px;
        line-height: 1.7;
      }

      .fatal-summary,
      .fatal-secondary {
        margin: 12px 0 0;
        color: var(--fatal-muted);
        font-family:
          "Cascadia Code",
          "SFMono-Regular",
          Consolas,
          "Liberation Mono",
          monospace;
        font-size: 11px;
        line-height: 1.6;
        overflow-wrap: anywhere;
      }

      .fatal-secondary {
        font-family: inherit;
      }

      .fatal-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 24px;
      }

      .fatal-button {
        display: inline-flex;
        min-height: 36px;
        align-items: center;
        justify-content: center;
        gap: 7px;
        padding: 0 13px;
        color: var(--fatal-foreground);
        font: inherit;
        font-size: 13px;
        font-weight: 600;
        background: transparent;
        border: 1px solid var(--fatal-border);
        border-radius: 8px;
        cursor: pointer;
        transition:
          background-color 120ms ease,
          border-color 120ms ease;
      }

      .fatal-button:hover {
        background: var(--fatal-hover);
      }

      .fatal-button:focus-visible,
      .fatal-details summary:focus-visible {
        outline: 2px solid rgb(24 24 27 / 35%);
        outline-offset: 2px;
      }

      .fatal-button-primary {
        color: #ffffff;
        background: var(--fatal-foreground);
        border-color: var(--fatal-foreground);
      }

      .fatal-button-primary:hover {
        background: #27272a;
      }

      .fatal-button-icon {
        width: 15px;
        height: 15px;
      }

      .fatal-details {
        margin-top: 28px;
        padding-top: 18px;
        border-top: 1px solid var(--fatal-border);
      }

      .fatal-details summary {
        width: fit-content;
        color: var(--fatal-muted);
        font-size: 12px;
        font-weight: 600;
        cursor: pointer;
        user-select: none;
      }

      .fatal-diagnostic {
        max-height: 320px;
        margin: 16px 0 0;
        overflow: auto;
        color: #3f3f46;
        font-family:
          "Cascadia Code",
          "SFMono-Regular",
          Consolas,
          "Liberation Mono",
          monospace;
        font-size: 11px;
        line-height: 1.7;
        white-space: pre-wrap;
        overflow-wrap: anywhere;
        user-select: text;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --window-backing-surface: #18181b;
          --fatal-foreground: #f4f4f5;
          --fatal-muted: #a1a1aa;
          --fatal-border: #3f3f46;
          --fatal-hover: rgb(255 255 255 / 6%);
          --fatal-danger: #f97066;
          --fatal-danger-surface: rgb(240 68 56 / 14%);
        }

        .fatal-button-primary {
          color: #18181b;
          background: #f4f4f5;
          border-color: #f4f4f5;
        }

        .fatal-button-primary:hover {
          background: #e4e4e7;
        }

        .fatal-diagnostic {
          color: #d4d4d8;
        }
      }

      @media (max-width: 640px) {
        .fatal-surface {
          place-items: start;
          padding: 40px 24px;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .fatal-button {
          transition: none;
        }
      }
    </style>

    <title>Hybrid Canvas</title>
  </head>

  <body>
    <div id="root"></div>

    <!--
      This module installs fatal collectors before the React entry executes.
      It renders nothing during a healthy startup.
    -->
    <script
      src="/src/fatal/pre-react-entry.ts"
      type="module"
    ></script>

    <script
      src="/src/main.tsx"
      type="module"
    ></script>
  </body>
</html>
