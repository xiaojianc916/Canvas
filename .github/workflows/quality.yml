name: Quality

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: quality-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.15.0
          run_install: false

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Verify JavaScript toolchain
        shell: bash
        run: |
          set -euo pipefail

          expected_node="$(tr -d '[:space:]' < .node-version)"
          actual_node="$(node --version | sed 's/^v//')"
          actual_pnpm="$(pnpm --version)"

          test "$actual_node" = "$expected_node"
          test "$actual_pnpm" = "11.15.0"

          if grep -R "set this to true or false" pnpm-workspace.yaml; then
            echo "::error::pnpm allowBuilds contains unresolved placeholders"
            exit 1
          fi

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: JavaScript dependency audit
        run: pnpm audit --audit-level high

      - name: Format
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

      - name: Architecture
        run: pnpm test:architecture

      - name: Typecheck
        run: pnpm typecheck

      - name: JavaScript tests
        run: pnpm turbo run test

      - name: Build
        run: pnpm build

      - name: Bundle budget
        run: pnpm analyze:bundle:check

  windows-desktop:
    name: Windows Desktop
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.15.0
          run_install: false

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@1.88.0
        with:
          components: rustfmt, clippy

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck workspace
        run: pnpm typecheck

      - name: Build desktop frontend
        run: pnpm build

      - name: Check Windows native target
        run: cargo check -p hybrid-canvas-desktop --all-targets --all-features

      - name: Build Windows desktop binary
        run: pnpm --filter @hybrid-canvas/desktop exec tauri build --debug --no-bundle

  rust:
    name: Rust
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@1.88.0
        with:
          components: rustfmt, clippy

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Verify Rust toolchain
        shell: bash
        run: |
          set -euo pipefail

          expected="1.88.0"
          actual="$(rustc --version | awk '{print $2}')"

          test "$actual" = "$expected"

      - name: Format
        run: cargo fmt --check

      - name: Check
        run: cargo check --workspace --all-targets --all-features

      - name: Verify generated IPC bindings
        shell: bash
        run: |
          set -euo pipefail
          cargo run -p hybrid-canvas-desktop --bin export-ipc-bindings
          git diff --exit-code -- platforms/desktop-ipc/src/generated/ipc-bindings.ts

      - name: Clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: Tests
        run: cargo test --workspace --all-features

      - name: Dependency policy
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check
          arguments: --all-features
