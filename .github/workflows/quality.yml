name: Quality

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_INCREMENTAL: 0
  CARGO_TERM_COLOR: always

jobs:
  frontend:
    name: Frontend
    runs-on: windows-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.15.0
          run_install: false

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Verify JavaScript toolchain
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $expectedNode = (Get-Content .node-version -Raw).Trim()
          $actualNode = (node --version).Trim().TrimStart("v")
          $actualPnpm = (pnpm --version).Trim()

          if ($actualNode -ne $expectedNode) {
            throw "Expected Node.js $expectedNode, got $actualNode"
          }

          if ($actualPnpm -ne "11.15.0") {
            throw "Expected pnpm 11.15.0, got $actualPnpm"
          }

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: JavaScript dependency audit
        run: pnpm audit --audit-level high

      - name: Format
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

      - name: Architecture
        run: pnpm test:architecture

      - name: Typecheck
        run: pnpm typecheck

      - name: JavaScript tests
        run: pnpm test:frontend

      - name: Build
        run: pnpm build

  windows-desktop:
    name: Windows Desktop
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.15.0
          run_install: false

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@1.88.0
        with:
          components: rustfmt, clippy

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck workspace
        run: pnpm typecheck

      - name: Build desktop frontend
        run: pnpm build

      - name: Check Windows native target
        run: cargo check -p hybrid-canvas-desktop --all-targets --all-features

      - name: Build Windows desktop binary
        run: pnpm --filter @hybrid-canvas/desktop exec tauri build --debug --no-bundle

  rust:
    name: Rust
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@1.88.0
        with:
          components: rustfmt, clippy

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Verify Rust toolchain
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $expected = "1.88.0"
          $actual = ((rustc --version).Trim() -split "\s+")[1]

          if ($actual -ne $expected) {
            throw "Expected Rust $expected, got $actual"
          }

      - name: Format
        run: cargo fmt --check

      - name: Check
        run: cargo check --workspace --all-targets --all-features

      - name: Verify generated IPC bindings
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          cargo run -p hybrid-canvas-desktop --bin export-ipc-bindings
          git diff --exit-code -- platforms/desktop-ipc/src/generated/ipc-bindings.ts

          if ($LASTEXITCODE -ne 0) {
            throw "Generated IPC bindings are out of date."
          }

      - name: Clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: Tests
        run: cargo test --workspace --all-features

      - name: Dependency policy
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check
          arguments: --all-features
